server.port=${WORKOUT_SERVICE_PORT:8082}
spring.application.name=workout-service

spring.datasource.url=${DB_WORKOUT_URL:jdbc:postgresql://localhost:5432/fitness_workouts}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

user.service.url=${USER_SERVICE_URL:http://localhost:8081}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
