server.port=${NOTIFICATION_SERVICE_PORT:8084}
spring.application.name=notification-service
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/fitness_notifications}
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:YOUR_EMAIL@gmail.com}
spring.mail.password=${MAIL_PASSWORD:YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.endpoints.web.exposure.include=health,info
