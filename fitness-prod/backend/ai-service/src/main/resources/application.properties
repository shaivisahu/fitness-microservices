server.port=${AI_SERVICE_PORT:8083}
spring.application.name=ai-service
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/fitness_ai}
user.service.url=${USER_SERVICE_URL:http://localhost:8081}
workout.service.url=${WORKOUT_SERVICE_URL:http://localhost:8082}
gemini.api.key=${GEMINI_API_KEY:YOUR_KEY_HERE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
