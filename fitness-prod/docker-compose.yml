version: '3.8'

services:

  # ─── DATABASES ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: fitness-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: fitness_users,fitness_workouts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-databases.sh:/docker-entrypoint-initdb.d/create-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7-jammy
    container_name: fitness-mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MICROSERVICES ──────────────────────────────────
  user-service:
    build: ./backend/user-service
    container_name: fitness-user-service
    env_file: .env
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  workout-service:
    build: ./backend/workout-service
    container_name: fitness-workout-service
    env_file: .env
    environment:
      DB_WORKOUT_URL: ${DB_WORKOUT_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      user-service:
        condition: service_started
    restart: unless-stopped

  ai-service:
    build: ./backend/ai-service
    container_name: fitness-ai-service
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      USER_SERVICE_URL: ${USER_SERVICE_URL}
      WORKOUT_SERVICE_URL: ${WORKOUT_SERVICE_URL}
    ports:
      - "8083:8083"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build: ./backend/notification-service
    container_name: fitness-notification-service
    env_file: .env
    environment:
      MONGO_URI: ${MONGO_URI}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    ports:
      - "8084:8084"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # ─── FRONTEND ───────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: fitness-frontend
    ports:
      - "3000:80"
    depends_on:
      - user-service
      - workout-service
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
